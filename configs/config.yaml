defaults:
  - _self_

hydra:
  job:
    chdir: false

paths:
  data_processed: data/processed
  models_dir: models

data:
  val_fraction: 0.1

training:
  epochs: 18
  batch_size: 128
  learning_rate: 0.0012
  weight_decay: 0.0001
  dropout: 0.3
  seed: 42
  wandb: true

predict:
  model_file: models/model.joblib
  input_dir: data/processed
  output_file: predictions.csv
