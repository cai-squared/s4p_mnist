name: Deploy Hugging Face Space

on:
  push:
    branches: [main]

jobs:
  deploy-space:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Install deploy dependencies
        run: |
          python -m pip install --upgrade pip
          pip install huggingface-hub

      - name: Create or update Hugging Face Space
        env:
          HF_API_TOKEN: ${{ secrets.HF_API_TOKEN }}
          HF_SPACE_ID: ${{ secrets.HF_SPACE_ID }}
        run: |
          python - <<'PY'
          import os
          from huggingface_hub import HfApi
          api = HfApi()
          api.create_repo(
              repo_id=os.environ['HF_SPACE_ID'],
              repo_type='space',
              token=os.environ['HF_API_TOKEN'],
              exist_ok=True,
          )
          PY

      - name: Clone space repository
        env:
          HF_API_TOKEN: ${{ secrets.HF_API_TOKEN }}
          HF_SPACE_ID: ${{ secrets.HF_SPACE_ID }}
        run: |
          git clone "https://${HF_API_TOKEN}@huggingface.co/spaces/${HF_SPACE_ID}" space_repo

      - name: Sync files to space
        run: |
          rsync -a --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='space_repo' \
            --exclude='data' \
            --exclude='models' \
            --exclude='outputs' \
            --exclude='reports' \
            --exclude='wandb' \
            --exclude='logs' \
            --exclude='.dvc' \
            --exclude='.dvcignore' \
            --exclude='stats.prof' \
            ./ space_repo/
          cd space_repo
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git config user.name 'github-actions[bot]'
          git add -A
          if git diff --cached --quiet; then
            echo 'No changes to deploy.'
          else
            git commit -m 'Deploy Hugging Face Space from GitHub Actions'
            git push
          fi
